<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Clarity OS — Intelligence</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: #ddd;
    overflow-x: hidden;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    padding-top:    calc(16px + env(safe-area-inset-top,    0px));
    min-height: 100vh;
    /* Prevent text-size adjustment on rotation. */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }
  h1 {
    color: #fff;
    font-weight: 300;
    font-size: 22px;
    margin: 0 0 4px 0;
    letter-spacing: 0.02em;
  }
  .subtitle {
    color: #777;
    font-size: 11px;
    margin-bottom: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  label {
    color: #888;
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    background: #141414;
    color: #ddd;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    /* 16px prevents iOS Safari zoom-on-focus. */
    font-size: 16px;
    font-family: inherit;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="text"]:focus { border-color: #555; }
  button {
    width: 100%;
    min-height: 44px;
    padding: 12px 16px;
    background: rgba(108, 207, 255, 0.06);
    color: #6cf;
    border: 1px solid rgba(108, 207, 255, 0.5);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }
  button:active   { background: rgba(108, 207, 255, 0.14); }
  button:disabled { opacity: 0.4; }
  #status {
    color: #888;
    font-size: 11px;
    font-family: "SF Mono", Consolas, Monaco, "Courier New", monospace;
    margin-bottom: 12px;
    min-height: 16px;
    word-break: break-word;
  }
  .section {
    margin-bottom: 10px;
    padding: 12px 14px;
    border: 1px solid #1f1f1f;
    background: #0d0d0d;
    border-radius: 4px;
  }
  .section-title {
    color: #6cf;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 8px;
    font-weight: 600;
  }
  pre {
    font-family: "SF Mono", Consolas, Monaco, "Courier New", monospace;
    font-size: 12px;
    line-height: 1.5;
    color: #c4c4c4;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    max-height: 320px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .error {
    color: #f88;
    border: 1px solid rgba(248, 136, 136, 0.4);
    background: rgba(248, 136, 136, 0.05);
    padding: 12px 14px;
    border-radius: 4px;
    font-family: "SF Mono", Consolas, Monaco, "Courier New", monospace;
    font-size: 12px;
    word-break: break-word;
  }
  noscript .error {
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<h1>Clarity OS</h1>
<div class="subtitle">Intelligence — Mobile</div>

<noscript>
  <div class="error">
    JavaScript is required to load the intelligence panel.
  </div>
</noscript>

<div class="controls">
  <label for="user-id">User</label>
  <input id="user-id" type="text" placeholder="user_id" value="alice"
         autocomplete="off" autocapitalize="none" autocorrect="off"
         spellcheck="false" inputmode="text">
  <button id="load-btn" type="button">Load Intelligence</button>
</div>

<div id="status"></div>
<div id="output"></div>

<script>
(function () {
  "use strict";

  var userInput = document.getElementById("user-id");
  var loadBtn   = document.getElementById("load-btn");
  var statusEl  = document.getElementById("status");
  var outputEl  = document.getElementById("output");

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (m) {
      return ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m];
    });
  }

  function renderSection(title, body) {
    var json;
    try {
      json = JSON.stringify(body, null, 2);
    } catch (e) {
      json = "[unrenderable]";
    }
    return '<div class="section">' +
           '<div class="section-title">' + escapeHtml(title) + '</div>' +
           '<pre>' + escapeHtml(json) + '</pre>' +
           '</div>';
  }

  function renderSnapshot(snap) {
    var sections = [
      ["date",        snap.date],
      ["macro",       snap.macro],
      ["daily_elins", snap.daily_elins],
      ["news",        snap.news],
      ["email",       snap.email],
      ["micro",       snap.micro]
    ];
    outputEl.innerHTML = sections.map(function (p) {
      return renderSection(p[0], p[1]);
    }).join("");
  }

  function showError(msg) {
    outputEl.innerHTML =
      '<div class="error">' + escapeHtml(msg) + '</div>';
  }

  function load() {
    var uid = userInput.value.trim();
    if (!uid) {
      statusEl.textContent = "Enter a user_id";
      outputEl.innerHTML = "";
      return;
    }
    statusEl.textContent = "Loading…";
    outputEl.innerHTML = "";
    loadBtn.disabled = true;

    fetch("/m/" + encodeURIComponent(uid), {
      method: "GET",
      credentials: "omit",
      cache: "no-store"
    })
    .then(function (res) {
      loadBtn.disabled = false;
      if (!res.ok) {
        return res.json().catch(function () { return {}; }).then(function (err) {
          var msg = "HTTP " + res.status;
          if (err && err.message) msg += " — " + err.message;
          statusEl.textContent = "";
          showError(msg);
          throw new Error(msg);
        });
      }
      return res.json();
    })
    .then(function (data) {
      if (!data) return;
      statusEl.textContent =
        "Loaded for " + uid + " · " + (data.date || "—");
      renderSnapshot(data);
    })
    .catch(function (e) {
      loadBtn.disabled = false;
      if (statusEl.textContent === "Loading…") statusEl.textContent = "";
      if (!outputEl.innerHTML) {
        showError(String(e && e.message ? e.message : e));
      }
    });
  }

  loadBtn.addEventListener("click", load);
  userInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") load();
  });
})();
</script>
</body>
</html>
