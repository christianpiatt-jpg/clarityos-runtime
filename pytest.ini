[pytest]
# PASS-6 Phase A — Test groups + CI gates.
#
# Three markers gate runtime changes against locked PASS-4/PASS-5
# invariants. They are applied automatically to test files by the
# ``pytest_collection_modifyitems`` hook in ``tests/conftest.py`` —
# you do not need to decorate individual test functions.
#
# CI usage:
#
#     # Full CI gate — must be green before merge for any change to
#     # BD1-BD5 (app.py / intelligence_kernel.py / model_router.py /
#     # operator_state.py / memory_vault.py / runtime_privacy.py):
#     pytest -m "runtime_spine or privacy_surface or determinism_surface"
#
#     # Per-suite local runs:
#     pytest -m runtime_spine
#     pytest -m privacy_surface
#     pytest -m determinism_surface
#
testpaths = tests

markers =
    runtime_spine: Cross-module BD1-BD5 stabilization tests. Must be green for any change touching app.py, intelligence_kernel.py, model_router.py, operator_state.py, memory_vault.py, or runtime_privacy.py.
    privacy_surface: Logging redaction, billing-surface redaction, forbidden-field stripping, plaintext-vault guardrails. Must be green for any change touching logging, operator_state, or vault.
    determinism_surface: Router model-selection determinism, founder-default vault consistency, operator_state sequence monotonicity, macro run-id format, key-cache PBKDF2 determinism. Must be green for changes to router / operator_state / vault.
    load_envelope: PASS-7 optional load + stress envelope tests. Synthetic concurrent traffic against the FastAPI test client + macro concurrency burst + timeout behaviour under load. NOT part of the default CI gate — opt in via ``pytest -m load_envelope``. Treated as informational, not gating.

# Quiet pytest's "PytestUnknownMarkWarning" so the markers above are
# the single source of truth (the warning fires when a marker is used
# without being registered here).
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
