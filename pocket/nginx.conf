server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path returns index.html so the
    # client-side router can take over. Cloud Run does NOT do this
    # by default for static-served content; this rule is the whole
    # reason for the nginx layer.
    location / {
        try_files $uri /index.html;
    }

    # Long-cache fingerprinted assets. Vite emits hashed filenames
    # (e.g. ``index-DEADBEEF.js``), so content-addressable caching
    # is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
