# PASS-6 Phase C — CI gate for the stabilised runtime.
#
# This workflow enforces the three PASS-6 test groups that gate any
# change touching BD1–BD5:
#
#   * runtime_spine        — cross-module BD1–BD5 stabilization tests
#   * privacy_surface      — logging redaction + billing surface + plaintext
#   * determinism_surface  — selection / sequencing / cache determinism
#
# A pull-request must be green on the union of the three before it may
# be merged to main. The workflow runs on pushes to feature branches
# (smoke), on PRs targeting main (gate), and on direct pushes to main
# (post-merge verification).
name: ci

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "pass-*/**"
  pull_request:
    branches:
      - main

# Cancel an in-flight run when a new push lands on the same ref so we
# don't burn minutes on superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runtime-gate:
    name: runtime CI gate (spine + privacy + determinism)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # The vault refuses to start without a secret — test runs supply
      # a fixed throwaway value, never a production secret. Production
      # mounts CLARITYOS_VAULT_SECRET from Google Secret Manager.
      CLARITYOS_VAULT_SECRET: ci-throwaway-vault-secret-DO-NOT-USE-IN-PROD
      # Force the in-memory backends so the suite doesn't touch fs /
      # sqlite / firestore. The conftest also setdefault()s this, but
      # we set it at the workflow level for belt-and-braces.
      CLARITYOS_BACKEND: memory
      # Mock-mode billing — no Stripe keys present in CI.
      CLARITYOS_BILLING_MODE: mock
      CLARITYOS_MOCK_AUTO_CONFIRM: "1"
      # Block the macro scheduler daemon from booting at app import.
      CLARITYOS_DISABLE_MACRO_SCHEDULER: "1"
      # Keep CI logs lean.
      CLARITYOS_LOG_LEVEL: WARNING

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime production dependencies.
          pip install -r requirements.txt
          # Test-only dependencies. Kept inline (not in a separate
          # requirements file) because they're stable + small and the
          # repo doesn't yet ship a dev-requirements.txt.
          pip install \
            pytest==8.3.3 \
            pytest-cov==5.0.0 \
            httpx==0.27.2

      - name: Run runtime_spine + privacy_surface + determinism_surface
        run: |
          python -m pytest \
            -m "runtime_spine or privacy_surface or determinism_surface" \
            --maxfail=1 \
            --cov=app \
            --cov=intelligence_kernel \
            --cov=model_router \
            --cov=operator_state \
            --cov=memory_vault \
            --cov=runtime_privacy \
            --cov-report=term-missing \
            --cov-report=xml:coverage-runtime.xml \
            --junitxml=junit-runtime.xml \
            -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-runtime
          path: coverage-runtime.xml
          if-no-files-found: ignore

      - name: Upload junit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-runtime
          path: junit-runtime.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Per-suite breakdown jobs. These run in parallel with the union job
  # above so a failure inside, say, privacy_surface surfaces in its own
  # row in the CI dashboard. Keeping them as separate jobs (rather than
  # one matrix) makes the "blocks merges to main unless green" branch-
  # protection rule simpler to configure: require each named check.
  # ---------------------------------------------------------------------------
  runtime-spine:
    name: runtime_spine suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLARITYOS_VAULT_SECRET: ci-throwaway-vault-secret-DO-NOT-USE-IN-PROD
      CLARITYOS_BACKEND: memory
      CLARITYOS_BILLING_MODE: mock
      CLARITYOS_MOCK_AUTO_CONFIRM: "1"
      CLARITYOS_DISABLE_MACRO_SCHEDULER: "1"
      CLARITYOS_LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.3 httpx==0.27.2
      - run: python -m pytest -m runtime_spine -q --maxfail=1

  privacy-surface:
    name: privacy_surface suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLARITYOS_VAULT_SECRET: ci-throwaway-vault-secret-DO-NOT-USE-IN-PROD
      CLARITYOS_BACKEND: memory
      CLARITYOS_BILLING_MODE: mock
      CLARITYOS_MOCK_AUTO_CONFIRM: "1"
      CLARITYOS_DISABLE_MACRO_SCHEDULER: "1"
      CLARITYOS_LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.3 httpx==0.27.2
      - run: python -m pytest -m privacy_surface -q --maxfail=1

  determinism-surface:
    name: determinism_surface suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLARITYOS_VAULT_SECRET: ci-throwaway-vault-secret-DO-NOT-USE-IN-PROD
      CLARITYOS_BACKEND: memory
      CLARITYOS_BILLING_MODE: mock
      CLARITYOS_MOCK_AUTO_CONFIRM: "1"
      CLARITYOS_DISABLE_MACRO_SCHEDULER: "1"
      CLARITYOS_LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.3 httpx==0.27.2
      - run: python -m pytest -m determinism_surface -q --maxfail=1
