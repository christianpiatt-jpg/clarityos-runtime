<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>Clarity OS — Intelligence Panel</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 24px;
    background: #0a0a0a;
    color: #ddd;
    min-height: 100vh;
  }
  h1 {
    color: #fff;
    font-weight: 300;
    font-size: 22px;
    margin: 0 0 4px 0;
    letter-spacing: 0.02em;
  }
  .subtitle {
    color: #777;
    font-size: 11px;
    margin-bottom: 24px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  label {
    color: #888;
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }
  input[type="text"] {
    padding: 7px 10px;
    background: #141414;
    color: #ddd;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    min-width: 200px;
    outline: none;
  }
  input[type="text"]:focus { border-color: #444; }
  button {
    padding: 7px 16px;
    background: transparent;
    color: #6cf;
    border: 1px solid rgba(108, 207, 255, 0.5);
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  button:hover { background: rgba(108, 207, 255, 0.06); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #status {
    color: #888;
    font-size: 11px;
    font-family: "SF Mono", Consolas, Monaco, "Courier New", monospace;
    margin-bottom: 16px;
    min-height: 16px;
  }
  .section {
    margin-bottom: 10px;
    padding: 10px 14px;
    border: 1px solid #1f1f1f;
    background: #0d0d0d;
    border-radius: 3px;
  }
  .section-title {
    color: #6cf;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 8px;
    font-weight: 600;
  }
  pre {
    font-family: "SF Mono", Consolas, Monaco, "Courier New", monospace;
    font-size: 11.5px;
    line-height: 1.5;
    color: #c4c4c4;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    max-height: 360px;
    overflow-y: auto;
  }
  .error {
    color: #f88;
    border: 1px solid rgba(248, 136, 136, 0.4);
    background: rgba(248, 136, 136, 0.05);
    padding: 12px 16px;
    border-radius: 3px;
    font-family: "SF Mono", Consolas, Monaco, "Courier New", monospace;
    font-size: 12px;
  }
</style>
</head>
<body>
<h1>Clarity OS — Intelligence Panel</h1>
<div class="subtitle">Read-only daily snapshot · macro · meso · micro</div>

<div class="controls">
  <label for="user-id">User</label>
  <input id="user-id" type="text" placeholder="user_id" value="alice"
         autocomplete="off" spellcheck="false">
  <button id="load-btn" type="button">Load Intelligence</button>
</div>

<div id="status"></div>
<div id="output"></div>

<script>
(function () {
  "use strict";

  var userInput = document.getElementById("user-id");
  var loadBtn   = document.getElementById("load-btn");
  var statusEl  = document.getElementById("status");
  var outputEl  = document.getElementById("output");

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (m) {
      return ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[m];
    });
  }

  function renderSection(title, body) {
    var json;
    try {
      json = JSON.stringify(body, null, 2);
    } catch (e) {
      json = "[unrenderable]";
    }
    return '<div class="section">' +
           '<div class="section-title">' + escapeHtml(title) + '</div>' +
           '<pre>' + escapeHtml(json) + '</pre>' +
           '</div>';
  }

  function renderSnapshot(snap) {
    var sections = [
      ["date",        snap.date],
      ["macro",       snap.macro],
      ["daily_elins", snap.daily_elins],
      ["news",        snap.news],
      ["email",       snap.email],
      ["micro",       snap.micro]
    ];
    outputEl.innerHTML = sections.map(function (pair) {
      return renderSection(pair[0], pair[1]);
    }).join("");
  }

  function showError(msg) {
    outputEl.innerHTML =
      '<div class="error">' + escapeHtml(msg) + '</div>';
  }

  function load() {
    var uid = userInput.value.trim();
    if (!uid) {
      statusEl.textContent = "Enter a user_id";
      outputEl.innerHTML = "";
      return;
    }
    statusEl.textContent = "Loading…";
    outputEl.innerHTML = "";
    loadBtn.disabled = true;

    fetch("/intelligence/" + encodeURIComponent(uid), {
      method: "GET",
      credentials: "omit",
      cache: "no-store"
    })
    .then(function (res) {
      loadBtn.disabled = false;
      if (!res.ok) {
        return res.json().catch(function () { return {}; }).then(function (err) {
          var msg = "HTTP " + res.status;
          if (err && err.message) msg += " — " + err.message;
          statusEl.textContent = "";
          showError(msg);
          throw new Error(msg);
        });
      }
      return res.json();
    })
    .then(function (data) {
      if (!data) return;
      statusEl.textContent =
        "Loaded for " + uid + " · " + (data.date || "—");
      renderSnapshot(data);
    })
    .catch(function (e) {
      loadBtn.disabled = false;
      if (statusEl.textContent === "Loading…") statusEl.textContent = "";
      if (!outputEl.innerHTML) {
        showError(String(e && e.message ? e.message : e));
      }
    });
  }

  loadBtn.addEventListener("click", load);
  userInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") load();
  });
})();
</script>
</body>
</html>
